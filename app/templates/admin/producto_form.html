{% extends "base.html" %}
{% block title %}{{ 'Editar' if producto else 'Nuevo' }} Producto{% endblock %}
{% block content %}
<h2>{{ 'Editar' if producto else 'Nuevo' }} Producto</h2>
<form method="POST">
    <div class="mb-3">
        <label>Categoría</label>
        <select name="id_categoria" class="form-select" required>
            <option value="">Seleccione...</option>
            {% for cat in categorias %}
            <option value="{{ cat['id_categoria'] }}" {% if producto and producto.id_categoria == cat['id_categoria'] %}selected{% endif %}>
                {{ cat['nombre'] }}
            </option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label>Nombre</label>
        <input type="text" name="nombre" class="form-control" value="{{ producto.nombre if producto else '' }}" required>
    </div>
    <div class="mb-3">
        <label>Stock</label>
        <input type="number" name="stock" class="form-control" value="{{ producto.stock if producto else 0 }}" required>
    </div>
    <div class="mb-3">
        <label>Precio</label>
        <input type="number" step="0.01" name="precio" class="form-control" value="{{ producto.precio if producto else 0 }}" required>
    </div>
    {% if producto %}
    <input type="hidden" name="id" value="{{ producto.id_producto }}">
    {% endif %}
    <button type="submit" class="btn btn-primary">Guardar</button>
    <a href="{{ url_for('admin.productos') }}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
