{% extends "base.html" %}
{% block title %}Productos{% endblock %}
{% block content %}
<h2>Listado de Productos</h2>
<a href="{{ url_for('admin.producto_nuevo') }}" class="btn btn-primary mb-3">Nuevo Producto</a>
<table class="table table-striped">
    <thead>
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Stock</th>
            <th>Precio</th>
            <th>Acciones</th>
        </tr>
    </thead>
    <tbody>
        {% for p in productos %}
        <tr>
            <td>{{ p.id_producto }}</td>
            <td>{{ p.nombre }}</td>
            <td>{{ p.stock }}</td>
            <td>${{ p.precio }}</td>
            <td>
                <a href="{{ url_for('admin.producto_editar', id=p.id_producto) }}" class="btn btn-sm btn-warning">Editar</a>
                <a href="{{ url_for('admin.producto_eliminar', id=p.id_producto) }}" class="btn btn-sm btn-danger" onclick="return confirm('¿Eliminar este producto?')">Eliminar</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
<a href="{{ url_for('admin.dashboard') }}" class="btn btn-secondary">Volver</a>
{% endblock %}
